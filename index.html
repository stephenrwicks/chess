<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chess</title>
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/stephenrwicks/wicks.css@main/wicks.css">    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/stephenrwicks/wicks.css@main/wicks.css"> -->
    <style>
        body {
            margin: 0px;
            display: grid;
            place-items: center;
            height: 100vh;
            background-color: antiquewhite;
        }

        chess-board {
            --squareSize: 5rem;
            --pieceSize: 3.7rem;
            --inset: calc(var(--squareSize)/18);
            --lightSquare: #9f90b0;
            --darkSquare: #7d4a8d;
            box-sizing: border-box;
            width: min-content;
            height: min-content;

            * {
                font-size: 16px;
                box-sizing: border-box;
            }

            button, input {
                display: grid;
                place-items: center;
                min-width: 4rem;
                width: fit-content;
                max-width: 100%;
                text-wrap: balance;
                user-select: none;
                cursor: pointer;
                background-color: var(--darkSquare);
                color: white;
                width: 100%;
                height: 2.5rem;
                padding: .4rem .6rem;
                outline: 0;
                border: 2px solid lightblue;
                border-radius: 0;

                &:hover:not(:disabled), &:focus:not(:disabled) {
                    border-color: darkblue;
                }

                &:active:not(:disabled) {
                    outline: 2px solid darkblue;
                }
            }

            >.board {
                /* box-shadow: 2px 2px 1rem #9f90b0; */
                width: fit-content;
                height: min-content;
                display: grid;
                grid-template-columns: repeat(8, 1fr);
                gap: 0px;

                >div {
                    display: grid;
                    place-items: center;
                    height: var(--squareSize);
                    width: var(--squareSize);
                    background-color: var(--lightSquare);

                    &.d {
                        background-color: var(--darkSquare);
                    }

                    &.legal {
                        box-shadow: inset 0 0 0 var(--inset) goldenrod;
                    }

                    &.active {
                        box-shadow: inset 0 0 0 var(--inset) hsla(120, 100%, 12.5%, 1);
                    }

                    &.check {
                        box-shadow: inset 0 0 0 var(--inset) red;
                    }

                    &.checkmate {
                        background-color: red;
                    }
                }

                .p {
                    font-size: var(--pieceSize);
                    user-select: none;

                    &::selection {
                        background-color: transparent;
                    }

                    &.w {
                        color: white;
                    }

                    &.b {
                        color: black;
                    }

                    &:is([data-active-color="w"] .p.w, [data-active-color="b"] .p.b) {
                        cursor: pointer;
                    }

                }
            }


            .promote[open] {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: calc(var(--squareSize) / 3);
                padding: calc(var(--squareSize) / 3);
                background-color: var(--lightSquare);
                border: 5px solid var(--darkSquare);

                &::backdrop {
                    background-color: var(--lightSquare);
                    opacity: .35;
                }

                button {
                    color: white;
                    width: var(--squareSize);
                    height: var(--squareSize);
                    background-color: var(--darkSquare);
                    border-radius: 0px;
                    border: 0px;
                    font-size: var(--pieceSize);
                    cursor: pointer;

                    &.b {
                        color: black;
                    }
                }
            }



            >.controls {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 2rem;
                place-items: center;
            }
        }
    </style>

</head>

<body>
    <script src="chess2.js"></script>
</body>

</html>
