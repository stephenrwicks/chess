<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chess</title>
    <style>
        body {
            margin: 0px;
            display: grid;
            place-items: center;
            height: 100vh;
            background-color: antiquewhite;
        }

        chess-board {
            display: grid;
            gap: .8rem;
            --squareSize: 5rem;
            --pieceSize: calc(var(--squareSize) / 1.1);
            --inset: calc(var(--squareSize)/18);
            --lightSquare: #9f90b0;
            --darkSquare: #7d4a8d;
            box-sizing: border-box;
            width: min-content;
            height: min-content;
            font: normal 16px Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;

            * {
                font: normal 16px Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;
                font-size: 16px;
                box-sizing: border-box;
            }



            >.board {
                width: fit-content;
                height: min-content;
                grid-row: span 2;
                display: grid;
                grid-template-columns: repeat(8, 1fr);
                gap: 0px;
                margin: 0 2rem;

                >div {
                    display: grid;
                    place-items: center;
                    height: var(--squareSize);
                    width: var(--squareSize);
                    background-color: var(--lightSquare);

                    &.d {
                        background-color: var(--darkSquare);
                    }

                    &.legal {
                        box-shadow: inset 0 0 0 var(--inset) goldenrod;
                    }

                    &.active {
                        box-shadow: inset 0 0 0 var(--inset) hsla(120, 100%, 12.5%, 1);
                    }

                    &.check {
                        box-shadow: inset 0 0 0 var(--inset) red;
                    }

                    &.checkmate {
                        background-color: red;
                    }

                }

                .p {
                    display: block;
                    user-select: none;
                    height: var(--pieceSize);
                    width: var(--pieceSize);

                    &:is([data-active-color="w"] .w, [data-active-color="b"] .b) {
                        cursor: pointer;
                    }

                }
            }

            dialog[open] {
                display: grid;
                gap: calc(var(--squareSize) / 3);
                padding: calc(var(--squareSize) / 3);
                background-color: antiquewhite;
                border: 5px solid var(--darkSquare);
                color: black;
                font-size: 16px;

                &::backdrop {
                    background-color: var(--lightSquare);
                    opacity: .35;
                }
            }

            .promote[open] {
                grid-template-columns: 1fr 1fr;

                button {
                    color: white;
                    width: var(--squareSize);
                    height: var(--squareSize);
                    background-color: var(--darkSquare);
                    border-radius: 0px;
                    border: 0px;
                    font-size: var(--pieceSize);
                    cursor: pointer;

                    &.b {
                        color: black;
                    }
                }
            }

            >.panel {
                display: grid;
                place-items: center;

                .notation-button {
                    background-color: unset;
                    width: min-content;
                    border: 0px;
                    padding: 0px;
                }

            }

            .pgn {
                display: flex;
                flex-flow: row wrap;
                min-height: 2rem;
                gap: .2rem;
                align-items: center;
            }



            >details.controls {
                width: fit-content;
                display: contents;

                button,
                input {
                    display: grid;
                    place-items: center;
                    width: 10rem;
                    height: 2rem;
                    max-width: 100%;
                    text-wrap: balance;
                    user-select: none;
                    cursor: pointer;
                    font-size: 80%;
                    padding: .4rem .6rem;
                    outline: 0;
                    border: 1px solid var(--darkSquare);
                    color: black;
                    background-color: lightgray;
                    transition: background-color .1s ease-out;

                    &:hover:not(:disabled),
                    &:focus:not(:disabled) {
                        border-color: darkblue;
                        background-color: rgb(169, 169, 169)
                    }

                    &:active:not(:disabled) {
                        outline: 2px solid darkblue;
                    }

                    &:is(input) {
                        cursor: initial;
                        caret-color: darkblue;

                        &:is(:active, :focus) {
                            background-color: white !important;
                        }
                    }
                }

                summary {
                    display: block;
                    font-size: 170%;
                    cursor: pointer;
                    text-align: center;
                    border: 1px solid darkblue;
                    border-radius: .3rem;
                    width: fit-content;
                    justify-self: center;
                    padding: .2rem;
                    background-color: mintcream;
                    transition: background-color .1s ease-in-out;

                    &:hover {
                        background-color: rgb(172, 255, 214);
                    }


                }

                &[open] summary {
                    background-color: rgb(172, 255, 214);
                }

                &[open]::details-content {
                    border: 1px solid black;
                    block-size: auto;
                    content-visibility: visible;
                    min-height: 5rem;
                    padding: 1rem;
                    display: grid;
                    grid-template-columns: repeat(4, 1fr);
                    justify-content: center;
                    gap: .3rem;
                    background-color: mintcream;
                }
            }
        }
    </style>

</head>

<body>
    <script src="chess.js"></script>
</body>

</html>
