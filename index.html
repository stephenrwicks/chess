<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chess</title>
    <style>
        body {
            margin: 0px;
            display: grid;
            justify-items: center;
            height: 100vh;
            background-color: antiquewhite;
        }

        chess-board {

            --unit: min(1vw, 1vh);
            --squareSize: min(calc(var(--unit) * 8), 5rem);
            --pieceSize: calc(var(--squareSize) * 1);
            --inset: calc(var(--squareSize)/18);
            --lightSquare: #9f90b0;
            --darkSquare: #7d4a8d;

            margin: var(--squareSize) 0px;
            display: grid;
            grid-template-columns: 1fr calc(var(--squareSize) * 4);
            gap: .8rem;
            width: min-content;
            height: min-content;
            font: normal 16px Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;
            box-sizing: border-box;

            * {
                font: normal 16px Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;
                box-sizing: border-box;
            }

            >.board {
                width: fit-content;
                height: min-content;
                display: grid;
                grid-template-columns: repeat(8, 1fr);
                gap: 0px;

                >div {
                    display: grid;
                    place-items: center;
                    height: var(--squareSize);
                    width: var(--squareSize);
                    background-color: var(--lightSquare);

                    &.d {
                        background-color: var(--darkSquare);
                    }

                    &.legal {
                        box-shadow: inset 0 0 0 var(--inset) goldenrod;
                    }

                    &.active {
                        box-shadow: inset 0 0 0 var(--inset) hsla(120, 100%, 12.5%, 1);
                    }

                    &.check {
                        box-shadow: inset 0 0 0 var(--inset) red;
                    }

                    &.checkmate {
                        background-color: red;
                    }

                }

                .p {
                    display: block;
                    user-select: none;
                    height: var(--pieceSize);
                    width: var(--pieceSize);

                    &:is([data-active-color="w"] .w, [data-active-color="b"] .b) {
                        cursor: pointer;
                    }

                }
            }

            dialog[open] {
                display: grid;
                gap: calc(var(--squareSize) / 3);
                padding: calc(var(--squareSize) / 3);
                background-color: antiquewhite;
                border: 5px solid var(--darkSquare);
                color: black;
                font-size: 16px;

                &::backdrop {
                    background-color: var(--lightSquare);
                    opacity: .55;
                }
            }

            .promote[open] {
                grid-template-columns: 1fr 1fr;

                button {
                    color: white;
                    width: var(--squareSize);
                    height: var(--squareSize);
                    background-color: var(--darkSquare);
                    border-radius: 0px;
                    border: 0px;
                    font-size: var(--pieceSize);
                    cursor: pointer;

                    &.b {
                        color: black;
                    }
                }
            }

            >.panel {
                height: calc(var(--squareSize) * 8);
                padding-top: 2vh;
                display: flex;
                flex-flow: column nowrap;
                gap: 2rem;


            }

            .fen-div {
                &::before {
                    font-size: 1rem;
                    display: block;
                    content: "📌 Forsyth–Edwards Notation: ";
                }

                font-size: .8rem;
            }

            .notation {
                flex-grow: 1;
                overflow: auto;

                >div {
                    display: grid;
                    gap: var(--squareSize);
                    grid-template-columns: min-content 1fr 1fr;
                    min-height: 1.5rem;
                    gap: .2rem;
                    align-items: center;

                    button {
                        background-color: unset;
                        border: 0px;
                        padding: 0px;
                    }
                }
            }

            .controls {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: .1rem;

                button {
                    width: auto;
                }

            }

            button,
            input {
                display: grid;
                place-items: center;
                height: 2rem;
                max-width: 100%;
                text-wrap: balance;
                user-select: none;
                cursor: pointer;
                font-size: .8rem;
                padding: .4rem .6rem;
                outline: 0;
                border: 1px solid var(--darkSquare);
                color: black;
                background-color: lightgray;
                transition: background-color .1s ease-out;

                &:hover:not(:disabled),
                &:focus:not(:disabled) {
                    border-color: darkblue;
                    background-color: rgb(169, 169, 169)
                }

                &:active:not(:disabled) {
                    outline: 2px solid darkblue;
                }

                &:is(input[type="text"]) {
                    cursor: initial;
                    caret-color: darkblue;

                    &:is(:active, :focus) {
                        background-color: white;
                    }
                }
            }


            @media (max-width: 768px) {
                --squareSize: 12vw;
                grid-template-columns: 1fr;

                .panel {
                    height: auto;
                }

                .notation {
                    display: flex;
                    flex-flow: row wrap;
                    gap: .5rem;
                }
            }

        }
    </style>

</head>

<body>
    <script src="chess.js"></script>
</body>

</html>
