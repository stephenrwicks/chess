<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chess</title>
    <style>
        * {
            --squareSize: 5rem;
            --pieceSize: 3.7rem;
            --inset: calc(var(--squareSize)/18);
            --lightSquare: #9f90b0;
            --darkSquare: #7d4a8d;

            font-size: 16px;
            box-sizing: border-box;
        }

        body {
            margin: 0px;
            display: grid;
            place-items: center;
            height: 100vh;
            background-color: antiquewhite;
        }

        chess-board {
            width: fit-content;
            height: min-content;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 0px;
        }

        .p {
            font-size: var(--pieceSize);
            user-select: none;
        }

        .p.w {
            color: white;
        }

        .p.b {
            color: black;
        }

        chess-board[data-active-color="w"] .p.w,
        chess-board[data-active-color="b"] .p.b {
            cursor: pointer;
        }

        .p::selection {
            background-color: transparent;
        }

        chess-board>div {
            display: grid;
            place-items: center;
            height: var(--squareSize);
            width: var(--squareSize);
            background-color: var(--lightSquare);
        }

        chess-board>div.d {
            background-color: var(--darkSquare);
        }

        chess-board>div.legal {
            box-shadow: inset 0 0 0 var(--inset) goldenrod;
        }

        chess-board>div.active {
            box-shadow: inset 0 0 0 var(--inset) hsla(120, 100%, 12.5%, 1);
        }

        chess-board>div.check {
            box-shadow: inset 0 0 0 var(--inset) red;
        }

        chess-board>div.checkmate {
            background-color: red;
        }
    </style>

</head>

<body>
    <script src="chess2.js"></script>
</body>

</html>
